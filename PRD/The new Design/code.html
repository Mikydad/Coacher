<button class="px-4 py-2.5 rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface-variant text-[0.8rem] font-medium hover:border-outline-variant transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[1.1rem]">science</span>
                    Miko Group Test 2

<button class="px-4 py-2.5 rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface-variant text-[0.8rem] font-medium hover:border-outline-variant transition-all flex items-center gap-2">

<!-- Section: The Stake -->

<div class="flex items-center justify-between">

</div>
<!-- Image Upload Tile: Active State -->
<div class="relative group cursor-pointer overflow-hidden rounded-xl h-[180px] border-2 border-error neon-glow-error transition-all hover:scale-[1.01] active:scale-[0.99]">

<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<div>
<p class="mono text-[0.6rem] text-white/60 mb-1">FILE_STAKE_01.JPEG</p>
<p class="text-[0.75rem] font-bold text-white uppercase tracking-wider">COLLATERAL DETECTED</p>
</div>
<button class="w-8 h-8 rounded-full bg-error text-on-error flex items-center justify-center">
<span class="material-symbols-outlined text-[1.1rem]">close</span>
</button>
</div>
<div class="absolute top-4 right-4 px-2 py-1 bg-error text-white text-[0.6rem] font-black tracking-widest rounded-md animate-pulse">
                    READY FOR RELEASE
                </div>
</div>
<p class="text-on-surface-variant text-[0.75rem] leading-relaxed italic opacity-80 px-1">
                This image will be automatically posted to your selected circles if you fail the challenge.

</section>
<!-- Section: Reveal Window -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<label class="font-label text-[0.6875rem] uppercase tracking-[0.15em] text-on-surface-variant font-bold">REVEAL WINDOW</label>
<span class="mono text-[0.6rem] text-secondary">AUTO_DESTRUCT_LATENCY</span>
</div>
<div class="grid grid-cols-3 gap-3">
<button class="time-chip p-4 rounded-xl bg-surface-container-high border border-outline-variant/10 flex flex-col items-center justify-center gap-1 transition-all hover:bg-surface-bright" onclick="selectTime(this)">
<span class="text-[0.9rem] font-bold text-on-surface">5</span>
<span class="mono text-[0.6rem] uppercase text-on-surface-variant">MINS</span>
</button>
<button class="time-chip p-4 rounded-xl bg-surface-container-high border border-outline-variant/10 flex flex-col items-center justify-center gap-1 transition-all hover:bg-surface-bright" onclick="selectTime(this)">
<span class="text-[0.9rem] font-bold text-on-surface">30</span>
<span class="mono text-[0.6rem] uppercase text-on-surface-variant">MINS</span>
</button>
<button class="time-chip p-4 rounded-xl bg-primary-container/20 border-2 border-primary flex flex-col items-center justify-center gap-1 transition-all neon-glow-primary" onclick="selectTime(this)">
<span class="text-[0.9rem] font-bold text-primary">1</span>
<span class="mono text-[0.6rem] uppercase text-primary">HOUR</span>
</button>
<button class="time-chip p-4 rounded-xl bg-surface-container-high border border-outline-variant/10 flex flex-col items-center justify-center gap-1 transition-all hover:bg-surface-bright" onclick="selectTime(this)">

</button>
<button class="time-chip p-4 rounded-xl bg-surface-container-high border border-outline-variant/10 flex flex-col items-center justify-center gap-1 transition-all hover:bg-surface-bright" onclick="selectTime(this)">
<span class="text-[0.9rem] font-bold text-on-surface">12</span>
<span class="mono text-[0.6rem] uppercase text-on-surface-variant">HOURS</span>
</button>
<button class="time-chip p-4 rounded-xl bg-surface-container-high border border-outline-variant/10 flex flex-col items-center justify-center gap-1 transition-all hover:bg-surface-bright" onclick="selectTime(this)">

</div>

                CONTINUE
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<!-- Atmospheric WebGL-like overlay (Simulated via SVG overlay for performance/compatibility) -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<defs>
<lineargradient id="gridGrad" x1="0%" x2="0%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#eaffb8" stop-opacity="0.1"></stop>
<stop offset="100%" stop-color="#00e3fd" stop-opacity="0"></stop>
</lineargradient>
</defs>
<pattern height="10" id="grid" patternunits="userSpaceOnUse" width="10">
<path class="text-primary-dim" d="M 10 0 L 0 0 0 10" fill="none" stroke="currentColor" stroke-width="0.1"></path>
</pattern>
<rect fill="url(#grid)" height="100" width="100"></rect>
</svg>
</div>
<script>
        function selectTime(el) {
            // Remove active classes from all
            document.querySelectorAll('.time-chip').forEach(chip => {
                chip.classList.remove('bg-primary-container/20', 'border-primary', 'neon-glow-primary');
                chip.classList.add('bg-surface-container-high', 'border-outline-variant/10');
                
                const spanMain = chip.querySelector('span:first-child');
                const spanSub = chip.querySelector('span:last-child');
                
                spanMain.classList.remove('text-primary');
                spanMain.classList.add('text-on-surface');
                
                spanSub.classList.remove('text-primary');
                spanSub.classList.add('text-on-surface-variant');
            });

            // Add active classes to selected
            el.classList.add('bg-primary-container/20', 'border-primary', 'neon-glow-primary');
            el.classList.remove('bg-surface-container-high', 'border-outline-variant/10');
            
            const spanMain = el.querySelector('span:first-child');
            const spanSub = el.querySelector('span:last-child');
            
            spanMain.classList.add('text-primary');
            spanMain.classList.remove('text-on-surface');
            
            spanSub.classList.add('text-primary');
            spanSub.classList.remove('text-on-surface-variant');
        }

        // Tactile vibration simulation on button clicks (where supported)
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
